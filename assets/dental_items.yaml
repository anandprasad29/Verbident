# Dental Items Metadata
# This file is the source of truth for all dental items in the app.
# Edit this file to add, remove, or modify dental items.
# After editing, run: dart run tool/generate_dental_items.dart

# All dental items available in the app
dental_items:
  # === Actions & Objects ===
